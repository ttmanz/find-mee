<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find-Mee — Your Night Starts Here</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #090D18;
    --surface:  #0F1525;
    --surface2: #151C30;
    --gold:     #C8800A;
    --gold-lit: #E8A020;
    --gold-dim: rgba(200,128,10,0.15);
    --text:     #E8DCC8;
    --muted:    #7A7060;
    --border:   rgba(200,128,10,0.2);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

  /* ── NAV ─────────────────────────────────────────────────── */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    background: rgba(9,13,24,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-size: 22px; font-weight: 900; color: var(--gold); letter-spacing: -0.5px; }
  .lang-switch { display: flex; gap: 6px; }
  .lang-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }
  .lang-btn.active { background: var(--gold); border-color: var(--gold); color: #090D18; }

  /* ── HERO ────────────────────────────────────────────────── */
  .hero {
    min-height: 90vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 80px 24px 60px;
    background: radial-gradient(ellipse at 50% 0%, rgba(200,128,10,0.12) 0%, transparent 65%);
  }
  .hero-badge {
    display: inline-block; padding: 6px 16px; border-radius: 20px;
    border: 1px solid var(--border); color: var(--gold); font-size: 13px;
    font-weight: 600; margin-bottom: 28px; background: var(--gold-dim);
  }
  .hero h1 {
    font-size: clamp(38px, 7vw, 76px); font-weight: 900; line-height: 1.1;
    letter-spacing: -2px; margin-bottom: 20px;
  }
  .hero h1 span { color: var(--gold); }
  .hero p {
    font-size: clamp(16px, 2.5vw, 20px); color: var(--muted); max-width: 600px;
    margin: 0 auto 40px; line-height: 1.7;
  }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 36px; border-radius: 14px; background: var(--gold);
    color: #090D18; font-weight: 800; font-size: 16px;
    text-decoration: none; border: none; cursor: pointer; transition: all .2s;
  }
  .hero-cta:hover { background: var(--gold-lit); transform: translateY(-2px); }
  .hero-phones {
    margin-top: 64px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  }
  .phone-mock {
    width: 160px; height: 300px; border-radius: 28px;
    border: 2px solid var(--border); background: var(--surface);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    box-shadow: 0 32px 64px rgba(0,0,0,0.5);
  }
  .phone-mock:nth-child(2) { transform: translateY(-24px); }
  .phone-icon { font-size: 36px; }
  .phone-label { font-size: 11px; color: var(--muted); font-weight: 600; text-align: center; padding: 0 12px; }

  /* ── SECTION BASE ───────────────────────────────────────── */
  section { padding: 96px 24px; max-width: 1100px; margin: 0 auto; }
  .section-label { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
  .section-title { font-size: clamp(28px, 4vw, 44px); font-weight: 800; line-height: 1.2; margin-bottom: 16px; }
  .section-sub { color: var(--muted); font-size: 17px; max-width: 560px; line-height: 1.7; }

  /* ── FEATURES ───────────────────────────────────────────── */
  .features-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px; margin-top: 56px;
  }
  .feature-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; transition: border-color .2s, transform .2s;
  }
  .feature-card:hover { border-color: var(--gold); transform: translateY(-4px); }
  .feature-icon { font-size: 36px; margin-bottom: 16px; }
  .feature-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .feature-desc { color: var(--muted); font-size: 14px; line-height: 1.6; }

  /* ── HOW IT WORKS ───────────────────────────────────────── */
  .steps { display: flex; flex-direction: column; gap: 0; margin-top: 56px; }
  .step { display: flex; gap: 28px; align-items: flex-start; padding: 32px 0; border-bottom: 1px solid var(--border); }
  .step:last-child { border-bottom: none; }
  .step-num {
    min-width: 52px; height: 52px; border-radius: 50%;
    background: var(--gold-dim); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: var(--gold); flex-shrink: 0;
  }
  .step-content h3 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .step-content p { color: var(--muted); font-size: 15px; line-height: 1.6; }

  /* ── SURVEY ─────────────────────────────────────────────── */
  #survey { max-width: 760px; }
  .survey-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 48px 40px; margin-top: 48px;
  }
  .q-block { margin-bottom: 36px; }
  .q-label {
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-bottom: 14px; display: block;
  }
  .q-num { color: var(--gold); margin-right: 8px; }
  .options-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .opt-btn {
    padding: 10px 18px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .15s; user-select: none;
  }
  .opt-btn:hover { border-color: var(--gold); color: var(--text); }
  .opt-btn.selected { background: var(--gold); border-color: var(--gold); color: #090D18; }
  .scale-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .scale-labels { display: flex; justify-content: space-between; margin-top: 8px; }
  .scale-label-text { font-size: 11px; color: var(--muted); }
  .scale-btn {
    width: 46px; height: 46px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center;
  }
  .scale-btn:hover { border-color: var(--gold); color: var(--text); }
  .scale-btn.selected { background: var(--gold); border-color: var(--gold); color: #090D18; }
  .survey-input {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: 15px; font-family: 'Inter', sans-serif;
    outline: none; transition: border-color .2s;
  }
  .survey-input:focus { border-color: var(--gold); }
  textarea.survey-input { min-height: 100px; resize: vertical; }
  .submit-btn {
    width: 100%; padding: 18px; border-radius: 14px;
    background: var(--gold); border: none; color: #090D18;
    font-size: 17px; font-weight: 800; cursor: pointer; transition: all .2s;
    margin-top: 8px;
  }
  .submit-btn:hover { background: var(--gold-lit); transform: translateY(-2px); }
  .submit-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
  .success-msg {
    display: none; text-align: center; padding: 48px 24px;
  }
  .success-msg .success-icon { font-size: 56px; margin-bottom: 16px; }
  .success-msg h3 { font-size: 24px; font-weight: 800; margin-bottom: 8px; color: var(--gold); }
  .success-msg p { color: var(--muted); font-size: 16px; }

  /* ── FOOTER ─────────────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--border); padding: 40px 32px;
    text-align: center; color: var(--muted); font-size: 14px;
  }
  footer span { color: var(--gold); font-weight: 700; }

  /* ── DIVIDER ────────────────────────────────────────────── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 0 24px; }

  /* ── RESPONSIVE ─────────────────────────────────────────── */
  @media (max-width: 600px) {
    nav { padding: 14px 20px; }
    .survey-wrap { padding: 32px 20px; }
    .scale-btn { width: 40px; height: 40px; font-size: 13px; }
    section { padding: 64px 20px; }
  }
</style>
</head>

<!-- ── HERO ─────────────────────────────────────────────────────── -->

<!-- ── SURVEY ───────────────────────────────────────────────────── -->
<section id="survey">

// ── STATE & LANG ──────────────────────────────────────────────────
let currentLang = 'en';
const answers = {};

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (T[lang][key] !== undefined) el.textContent = T[lang][key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (T[lang][key] !== undefined) el.innerHTML = T[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (T[lang][key] !== undefined) el.placeholder = T[lang][key];
  });
}

// ── BUILD SCALE BUTTONS ──────────────────────────────────────────
document.querySelectorAll('[data-type="scale"]').forEach(row => {
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'scale-btn'; btn.textContent = i;
    btn.onclick = () => {
      row.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      answers[row.dataset.q] = i;
    };
    row.appendChild(btn);
  }
});

// ── OPTION BUTTONS ───────────────────────────────────────────────
document.querySelectorAll('[data-type="single"], [data-type="multi"]').forEach(grid => {
  grid.querySelectorAll('.opt-btn').forEach(btn => {
    btn.onclick = () => {
      if (grid.dataset.type === 'single') {
        grid.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        answers[grid.dataset.q] = btn.textContent;
      } else {
        btn.classList.toggle('selected');
        answers[grid.dataset.q] = [...grid.querySelectorAll('.opt-btn.selected')].map(b => b.textContent);
      }
    };
  });
});
